services:
  react-prod:
    build:
      context: .
      dockerfile: Dockerfile
    image: docker-reactjs-sample
    ports:
      - "${PORT_PROD:8080}:8080"
    environment:
      - PORT=${PORT_PROD}
      - PORT_UI=${PORT_PROD_UI}

  react-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "${PORT:5173}:5173"
    environment:
      - PORT=${PORT}
    develop:
        - action: sync
          path: ./my-react-app/src
          target: /app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./my-react-app/package.json
          target: /app/package.json
        - action: rebuild
          path: ./my-react-app/vite.config.ts
          target: /app/vite.config.ts
